version: "3.8"

x-image: &image
  image: ${REGISTRY_IMAGE:-mi-erpnext-custom}:${IMAGE_TAG:-latest}
  pull_policy: never   # usa la imagen buildeada localmente por Coolify

x-depends-configurator: &depends-configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-bench-volumes: &bench-volumes
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - logs:/home/frappe/frappe-bench/logs

services:

  # ---------- Setup inicial (corre una vez al arrancar) ----------
  configurator:
    <<: *image
    command: >
      bash -c "
        bench set-config -g db_host db &&
        bench set-config -gp db_port 3306 &&
        bench set-config -g redis_cache redis://redis-cache:6379 &&
        bench set-config -g redis_queue redis://redis-queue:6379 &&
        bench set-config -g redis_socketio redis://redis-socketio:6379 &&
        bench set-config -gp socketio_port 9000
      "
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
      redis-socketio:
        condition: service_started

  # ---------- Workers ----------
  backend:
    <<: [*image, *depends-configurator, *bench-volumes]

  queue-short:
    <<: [*image, *depends-configurator, *bench-volumes]
    command: bench worker --queue short,default

  queue-long:
    <<: [*image, *depends-configurator, *bench-volumes]
    command: bench worker --queue long,default,short

  scheduler:
    <<: [*image, *depends-configurator, *bench-volumes]
    command: bench schedule

  websocket:
    <<: [*image, *depends-configurator, *bench-volumes]
    command: node /home/frappe/frappe-bench/apps/frappe/socketio.js

  # ---------- Frontend ----------
  frontend:
    <<: *image
    command: nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: $$host
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    ports:
      - "${HTTP_PORT:-8080}:8080"
    depends_on:
      - backend
      - websocket

  # ---------- Infraestructura ----------
  db:
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--password=${DB_ROOT_PASSWORD}"]
      interval: 5s
      retries: 20
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme_strong}
    volumes:
      - db-data:/var/lib/mysql

  redis-cache:
    image: redis:7-alpine

  redis-queue:
    image: redis:7-alpine

  redis-socketio:
    image: redis:7-alpine

volumes:
  db-data:
  sites:
  logs:
